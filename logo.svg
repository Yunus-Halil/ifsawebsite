<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" fill="none">
  <defs>
    <linearGradient id="purp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#2D0057"/>
    </linearGradient>
  </defs>

  <!-- ===== ICON MARK (80x80 area, centred at 40,45) ===== -->

  <!-- Star — gold, top-left of icon -->
  <polygon
    points="16,2 18.4,9.6 26,9.6 20,14.4 22.4,22 16,17.2 9.6,22 12,14.4 6,9.6 13.6,9.6"
    fill="#F5C842"/>

  <!-- Mortar board flat top -->
  <rect x="22" y="18" width="36" height="6" rx="1.5" fill="#2D0057"/>
  <!-- Board overhang sides -->
  <rect x="20" y="22" width="40" height="4" rx="1" fill="#2D0057"/>

  <!-- Tassel cord (right side drop) -->
  <rect x="57" y="26" width="2.5" height="10" rx="1.2" fill="#F5C842"/>
  <circle cx="58.25" cy="37" r="3" fill="#F5C842"/>

  <!-- Head -->
  <rect x="30" y="28" width="20" height="18" rx="4" fill="#2D0057"/>
  <!-- Face detail: two white eye dots -->
  <circle cx="36" cy="36" r="2" fill="white"/>
  <circle cx="44" cy="36" r="2" fill="white"/>
  <!-- Smile arc -->
  <path d="M35 41 Q40 45 45 41" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Laptop body -->
  <rect x="18" y="50" width="44" height="28" rx="4" fill="#2D0057"/>
  <!-- Screen bezel -->
  <rect x="22" y="53" width="36" height="20" rx="2" fill="white" opacity=".12"/>
  <!-- Screen symbol: white circle (like the image) -->
  <circle cx="40" cy="63" r="6" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Laptop base/hinge line -->
  <rect x="14" y="78" width="52" height="3" rx="1.5" fill="#2D0057" opacity=".5"/>

  <!-- ===== WORDMARK ===== -->
  <!-- IFISA -->
  <text x="92" y="56" font-family="'Segoe UI',Arial,sans-serif" font-weight="900"
        font-size="34" fill="url(#purp)" letter-spacing="-1">IFISA</text>
  <!-- Gold underline -->
  <rect x="92" y="60" width="108" height="3.5" rx="1.75" fill="#F5C842"/>
  <!-- Subtitle -->
  <text x="92" y="76" font-family="'Segoe UI',Arial,sans-serif" font-weight="500"
        font-size="8.5" fill="#6B21A8" letter-spacing="0.9">INTELLIGENT FUTURES INTERNATIONAL STEM ACADEMY</text>
  <!-- Tagline -->
  <circle cx="92" cy="87" r="2.5" fill="#F5C842"/>
  <text x="98" y="90" font-family="'Segoe UI',Arial,sans-serif" font-weight="600"
        font-size="7.5" fill="#9333EA" letter-spacing="0.3">The Future-Ready Baccalaureate for the Age of AI</text>
</svg>
